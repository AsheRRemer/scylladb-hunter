target_company: ScyllaDB

sender:
  name: "Asher Remer"
  title: "GTM Engineer, ScyllaDB"

pipeline:
  max_leads: 20
  min_score_threshold: 60
  dry_run: true

sequence:
  linkedin_accept_rate: 0.35
  email_reply_rate: 0.20

scoring:
  title_seniority_weight: 0.35
  company_size_weight: 0.20
  datastax_signal_weight: 0.40
  activity_recency_weight: 0.00  # zeroed until real activity timestamps are available from Apollo
  confidence_threshold: 70

apollo:
  api_key: ""  # or set APOLLO_API_KEY env var
  organization_names:
    - DataStax
  titles:
    - engineer
    - architect
    - infrastructure
    - database
    - backend
    - CTO
    - VP Engineering
  seniorities:
    - senior
    - manager
    - director
    - vp
    - c_suite
    - entry

data:
  raw_pool: data/leads_raw_pool.json
  hunter_pool: data/hunter_email_pool.json

hunter:
  api_key: ""  # or set HUNTER_API_KEY env var

hubspot:
  api_key: ""  # or set HUBSPOT_API_KEY env var
  # sender.email must also be set for email logging to work

anthropic:
  model: claude-haiku-4-5-20251001
  max_tokens: 600

output:
  log_file: output/dry_run_log.json
  report_file: output/report.html
  db_file: output/leads.db
